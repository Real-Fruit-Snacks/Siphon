<svg xmlns="http://www.w3.org/2000/svg" width="800" height="280" viewBox="0 0 800 280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#11111b"/>
      <stop offset="50%" style="stop-color:#1e1e2e"/>
      <stop offset="100%" style="stop-color:#181825"/>
    </linearGradient>
    <linearGradient id="title-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#94e2d5"/>
      <stop offset="25%" style="stop-color:#89dceb"/>
      <stop offset="50%" style="stop-color:#89b4fa"/>
      <stop offset="75%" style="stop-color:#b4befe"/>
      <stop offset="100%" style="stop-color:#cba6f7"/>
    </linearGradient>
    <linearGradient id="wave1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#94e2d5;stop-opacity:0.10"/>
      <stop offset="50%" style="stop-color:#89b4fa;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#cba6f7;stop-opacity:0.04"/>
    </linearGradient>
    <linearGradient id="wave2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#89dceb;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#94e2d5;stop-opacity:0.03"/>
    </linearGradient>
    <linearGradient id="wave3" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#b4befe;stop-opacity:0.06"/>
      <stop offset="100%" style="stop-color:#89b4fa;stop-opacity:0.02"/>
    </linearGradient>
    <linearGradient id="accent-line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#94e2d5;stop-opacity:0"/>
      <stop offset="15%" style="stop-color:#94e2d5"/>
      <stop offset="35%" style="stop-color:#89dceb"/>
      <stop offset="50%" style="stop-color:#89b4fa"/>
      <stop offset="65%" style="stop-color:#b4befe"/>
      <stop offset="85%" style="stop-color:#cba6f7"/>
      <stop offset="100%" style="stop-color:#cba6f7;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-subtle">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="280" rx="12" fill="url(#bg)"/>

  <!-- Subtle border -->
  <rect width="800" height="280" rx="12" fill="none" stroke="#313244" stroke-width="1"/>

  <!-- Water/siphon wave shapes — layered for depth -->
  <path d="M0,180 Q100,160 200,170 T400,155 T600,165 T800,145 L800,280 L0,280 Z" fill="url(#wave1)"/>
  <path d="M0,210 Q150,185 300,200 T600,190 T800,175 L800,280 L0,280 Z" fill="url(#wave2)"/>
  <path d="M0,240 Q200,220 400,235 T800,215 L800,280 L0,280 Z" fill="url(#wave3)"/>

  <!-- Siphon flow lines — curved paths suggesting data extraction -->
  <g opacity="0.06">
    <path d="M50,60 Q200,40 350,80 Q500,120 650,70 Q730,45 780,55" fill="none" stroke="#94e2d5" stroke-width="1.5"/>
    <path d="M20,90 Q180,70 340,100 Q500,130 680,85 Q750,70 790,80" fill="none" stroke="#89b4fa" stroke-width="1"/>
    <path d="M30,75 Q190,55 345,90 Q510,125 670,78 Q740,58 785,68" fill="none" stroke="#b4befe" stroke-width="1"/>
  </g>

  <!-- Decorative dots — subtle data particles -->
  <g opacity="0.10">
    <circle cx="680" cy="50" r="1.5" fill="#94e2d5"/>
    <circle cx="700" cy="42" r="1" fill="#89dceb"/>
    <circle cx="720" cy="55" r="1.5" fill="#89b4fa"/>
    <circle cx="695" cy="65" r="1" fill="#b4befe"/>
    <circle cx="715" cy="38" r="1" fill="#cba6f7"/>
    <circle cx="740" cy="48" r="1.5" fill="#94e2d5"/>
    <circle cx="660" cy="58" r="1" fill="#89dceb"/>
    <circle cx="750" cy="60" r="1" fill="#89b4fa"/>
    <circle cx="670" cy="40" r="1.5" fill="#b4befe"/>
    <circle cx="755" cy="42" r="1" fill="#94e2d5"/>
    <circle cx="80" cy="210" r="1.5" fill="#89b4fa"/>
    <circle cx="60" cy="220" r="1" fill="#94e2d5"/>
    <circle cx="100" cy="225" r="1.5" fill="#89dceb"/>
    <circle cx="75" cy="235" r="1" fill="#b4befe"/>
    <circle cx="45" cy="215" r="1" fill="#94e2d5"/>
    <circle cx="115" cy="218" r="1" fill="#cba6f7"/>
    <circle cx="130" cy="230" r="1.5" fill="#89b4fa"/>
    <circle cx="50" cy="240" r="1" fill="#89dceb"/>
  </g>

  <!-- Title -->
  <text x="400" y="125" font-family="'SF Mono','Fira Code','JetBrains Mono','Cascadia Code',Consolas,monospace"
        font-size="64" font-weight="bold" fill="url(#title-grad)" text-anchor="middle"
        letter-spacing="14" filter="url(#glow)">SIPHON</text>

  <!-- Accent line under title -->
  <rect x="180" y="143" width="440" height="2" rx="1" fill="url(#accent-line)"/>

  <!-- Subtitle -->
  <text x="400" y="175" font-family="'SF Mono','Fira Code','JetBrains Mono','Cascadia Code',Consolas,monospace"
        font-size="13" fill="#bac2de" text-anchor="middle"
        letter-spacing="5">RED TEAM COMMAND &amp; CONTROL FRAMEWORK</text>

  <!-- Feature badges -->
  <g transform="translate(68, 205)">
    <!-- ecdh p-256 -->
    <rect x="0" y="0" width="110" height="28" rx="14" fill="#313244"/>
    <rect x="0" y="0" width="110" height="28" rx="14" fill="none" stroke="#45475a" stroke-width="0.5"/>
    <circle cx="16" cy="14" r="4" fill="#94e2d5"/>
    <text x="28" y="18" font-family="'SF Mono','Fira Code','JetBrains Mono',Consolas,monospace"
          font-size="11" fill="#cdd6f4">ecdh p-256</text>

    <!-- aes-256-gcm -->
    <rect x="130" y="0" width="120" height="28" rx="14" fill="#313244"/>
    <rect x="130" y="0" width="120" height="28" rx="14" fill="none" stroke="#45475a" stroke-width="0.5"/>
    <circle cx="146" cy="14" r="4" fill="#89dceb"/>
    <text x="158" y="18" font-family="'SF Mono','Fira Code','JetBrains Mono',Consolas,monospace"
          font-size="11" fill="#cdd6f4">aes-256-gcm</text>

    <!-- utls chrome -->
    <rect x="270" y="0" width="120" height="28" rx="14" fill="#313244"/>
    <rect x="270" y="0" width="120" height="28" rx="14" fill="none" stroke="#45475a" stroke-width="0.5"/>
    <circle cx="286" cy="14" r="4" fill="#89b4fa"/>
    <text x="298" y="18" font-family="'SF Mono','Fira Code','JetBrains Mono',Consolas,monospace"
          font-size="11" fill="#cdd6f4">utls chrome</text>

    <!-- etw/amsi patch -->
    <rect x="410" y="0" width="130" height="28" rx="14" fill="#313244"/>
    <rect x="410" y="0" width="130" height="28" rx="14" fill="none" stroke="#45475a" stroke-width="0.5"/>
    <circle cx="426" cy="14" r="4" fill="#b4befe"/>
    <text x="438" y="18" font-family="'SF Mono','Fira Code','JetBrains Mono',Consolas,monospace"
          font-size="11" fill="#cdd6f4">etw/amsi patch</text>

    <!-- catppuccin -->
    <rect x="560" y="0" width="120" height="28" rx="14" fill="#313244"/>
    <rect x="560" y="0" width="120" height="28" rx="14" fill="none" stroke="#45475a" stroke-width="0.5"/>
    <circle cx="576" cy="14" r="4" fill="#cba6f7"/>
    <text x="588" y="18" font-family="'SF Mono','Fira Code','JetBrains Mono',Consolas,monospace"
          font-size="11" fill="#cdd6f4">catppuccin</text>
  </g>
</svg>
