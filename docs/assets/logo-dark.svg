<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220" fill="none">
  <defs>
    <!-- Primary gradient: red to maroon (3-stop, 40% mid) -->
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f38ba8"/>
      <stop offset="40%" stop-color="#f38ba8"/>
      <stop offset="100%" stop-color="#eba0ac"/>
    </linearGradient>

    <!-- Accent gradient: maroon to red -->
    <linearGradient id="g2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#eba0ac"/>
      <stop offset="100%" stop-color="#f38ba8"/>
    </linearGradient>

    <!-- Icon gradient: vertical -->
    <linearGradient id="g3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f38ba8"/>
      <stop offset="50%" stop-color="#f38ba8"/>
      <stop offset="100%" stop-color="#eba0ac"/>
    </linearGradient>

    <!-- Tube gradient: flowing along siphon path -->
    <linearGradient id="g4" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#eba0ac" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#f38ba8" stop-opacity="0.9"/>
    </linearGradient>

    <!-- Softglow filter -->
    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur"/>
      <feFlood flood-color="#f38ba8" flood-opacity="0.15" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feComposite in="SourceGraphic" in2="shadow" operator="over"/>
    </filter>
  </defs>

  <!-- ===================== LOGOMARK: The Siphon Tube ===================== -->
  <g transform="translate(58, 40)" filter="url(#softglow)">

    <!-- Hexagonal frame -->
    <path d="M 80 6 L 140 38 L 140 102 L 80 134 L 20 102 L 20 38 Z"
          fill="none" stroke="url(#g1)" stroke-width="1.5" opacity="0.4"/>

    <!-- Inner hex fill -->
    <path d="M 80 14 L 134 42 L 134 98 L 80 126 L 26 98 L 26 42 Z"
          fill="#f38ba8" opacity="0.04"/>

    <!-- Siphon tube: S-curve from bottom-left to top-right -->
    <path d="M 36 105 C 36 80, 55 75, 65 65 C 75 55, 85 55, 95 50 C 105 45, 115 40, 125 30"
          stroke="url(#g1)" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.9"/>

    <!-- Parallel inner tube line for depth -->
    <path d="M 39 108 C 39 83, 57 78, 67 68 C 77 58, 87 58, 97 53 C 107 48, 117 43, 127 33"
          stroke="url(#g2)" stroke-width="1" stroke-linecap="round" fill="none" opacity="0.25"/>

    <!-- Flow chevrons along tube -->
    <path d="M 48 90 L 52 86 L 56 90" stroke="#eba0ac" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.6"/>
    <path d="M 70 66 L 74 62 L 78 66" stroke="#f38ba8" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.7"/>
    <path d="M 100 48 L 104 44 L 108 48" stroke="#f38ba8" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.8"/>

    <!-- Source node at bottom-left -->
    <circle cx="36" cy="105" r="3" fill="#eba0ac" opacity="0.7"/>

    <!-- Destination node at top-right -->
    <circle cx="125" cy="30" r="5" fill="#f38ba8" opacity="0.9"/>
    <circle cx="125" cy="30" r="2.5" fill="#1e1e2e"/>
    <circle cx="125" cy="30" r="8" fill="none" stroke="#f38ba8" stroke-width="0.5" opacity="0.3"/>

    <!-- Droplet shapes being pulled along the tube -->
    <ellipse cx="45" cy="92" rx="2" ry="2.5" fill="#eba0ac" opacity="0.5" transform="rotate(-40 45 92)"/>
    <ellipse cx="62" cy="72" rx="1.8" ry="2.2" fill="#f38ba8" opacity="0.55" transform="rotate(-35 62 72)"/>
    <ellipse cx="82" cy="58" rx="1.5" ry="2" fill="#f38ba8" opacity="0.6" transform="rotate(-30 82 58)"/>
    <ellipse cx="112" cy="38" rx="1.5" ry="2" fill="#f38ba8" opacity="0.65" transform="rotate(-30 112 38)"/>

    <!-- Subtle flow particles -->
    <circle cx="55" cy="78" r="1.2" fill="#eba0ac" opacity="0.4"/>
    <circle cx="90" cy="53" r="1.2" fill="#f38ba8" opacity="0.4"/>
    <circle cx="118" cy="34" r="1.5" fill="#f38ba8" opacity="0.5"/>

    <!-- Corner accents -->
    <circle cx="80" cy="6" r="2" fill="#f38ba8" opacity="0.3"/>
    <circle cx="80" cy="134" r="2" fill="#eba0ac" opacity="0.3"/>
  </g>

  <!-- ===================== TYPOGRAPHY ===================== -->

  <text x="415" y="108"
        font-family="'SF Pro Display', 'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="70" font-weight="800" letter-spacing="18"
        fill="url(#g1)" text-anchor="middle">SIPHON</text>

  <line x1="280" y1="128" x2="550" y2="128"
        stroke="url(#g1)" stroke-width="0.8" opacity="0.25"/>

  <text x="415" y="152"
        font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace"
        font-size="11.5" font-weight="400" letter-spacing="5.5"
        fill="#7f849c" text-anchor="middle">LIGHTWEIGHT C2 FRAMEWORK</text>

  <text x="415" y="172"
        font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', monospace"
        font-size="9" font-weight="400" letter-spacing="3"
        fill="#585b70" text-anchor="middle">GO  ·  ECDH  ·  AES-GCM  ·  UTLS</text>
</svg>
